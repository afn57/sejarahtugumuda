    <div class="gi" data-cat="sejarah" onclick="gnote('Proses Pembangunan 1951','Dokumentasi saat tugu mulai dibangun di lokasi baru, di depan Lawang Sewu yang megah.')">

      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="sejarah" onclick="gnote('Peresmian 20 Mei 1953','Momen bersejarah saat Presiden Soekarno meresmikan Tugu Muda — hari yang dinanti seluruh rakyat Semarang.')">
      <img src="image/peresmian.jpg" alt="Peresmian 1953" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="sejarah" onclick="gnote('Tugu Muda Tempo Dulu','Suasana sekitar Tugu Muda di era 1950–1960an — masih sangat lengang dan penuh kenangan.')">
      <img src="image/tempo dulu.jpg" alt="Tempo Dulu" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="modern" onclick="gnote('Tugu Muda Kini 2024','Tampilan terkini dengan taman terawat dan pencahayaan modern di malam hari.')">
      <img src="image/sekarang.jpg" alt="Tugu Muda 2024" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="modern" onclick="gnote('Pemandangan Malam','Cahaya lampu kuning dan putih menciptakan bayangan yang megah dan khidmat.')">
      <img src="image/malam.jpg" alt="Malam Hari" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="modern" onclick="gnote('Kolam Hias & Taman Kota','Air mancur dan taman yang mengelilingi tugu, menjadi ruang publik favorit warga Semarang.')">
      <img src="image/kolam.jpg" alt="Kolam dan Taman" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="detail" onclick="gnote('Relief Hongerodeem','Ukiran pada pilar pertama — derita rakyat di bawah penjajahan, dipahat abadi dalam batu.')">
      <img src="image/hongerodeem.jpg" alt="Relief Hongerodeem" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>

    <div class="gi" data-cat="detail" onclick="gnote('Puncak Tugu — Nyala Api','Kepala tugu berbentuk api yang menyala, simbol semangat juang yang abadi sepanjang masa.')">
      <img src="image/tugu api.jpg" alt="Puncak Tugu" onerror="this.style.display='none'"/>
      <div class="gi-overlay">
      </div>
    </div>
